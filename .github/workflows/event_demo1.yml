name: Events demo1
on: 
  pull_request:
    types: opened

jobs:
  demo-job:
    runs-on: ubuntu-latest
    steps:
      - name: Output event data
        run: echo "${{ toJSON(github.event) }}"
      - name: Get code
        uses: actions/checkout@v5
      - name: Install dependencies
        run: npm ci
      - name: Test code
        run: npm run test   
      - name: Build code
        run: npm run build
      - name: Deploy code
        run: echo "Deploying ..."