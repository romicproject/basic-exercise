name: Events demo1
on: 
  pull_request:
    types: opened

  workflow_dispatch:
  
  push:
    branches:  #[main, 'dev-*']
      - main # main branch
      - 'dev-*' # dev-new dev-this-is-dev
      - 'feat/**' # feat/new feat/new/button
    paths-ignore:
      - '.github/workflows/**' # ignore changes in workflow files

jobs:
  demo-job:
    runs-on: ubuntu-latest
    steps:
      - name: Output event data
        run: echo "${{ toJSON(github.event) }}"
      - name: Get code
        uses: actions/checkout@v5
      - name: Install dependencies
        run: npm ci
      - name: Test code
        run: npm run test   
      - name: Build code
        run: npm run build
      - name: Deploy code
        run: echo "Deploying ..."